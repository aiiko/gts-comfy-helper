<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GTS Comfy Helper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card hero">
        <h1>ComfyUI Helper</h1>
        <p class="subtitle">Genera imágenes con live preview y configuración persistente.</p>

        <div class="prompt-row">
          <label for="prompt">Prompt</label>
          <textarea id="prompt" rows="3" placeholder="Describe la escena..."></textarea>
          <div class="aspect-row" role="radiogroup" aria-label="Aspect ratio">
            <span class="aspect-label">Aspect ratio</span>
            <div class="aspect-options">
              <label class="aspect-option">
                <input type="radio" name="aspectRatio" value="portrait" />
                <span>Portrait: 896x1152</span>
              </label>
              <label class="aspect-option">
                <input type="radio" name="aspectRatio" value="square" checked />
                <span>Square: 1024x1024</span>
              </label>
              <label class="aspect-option">
                <input type="radio" name="aspectRatio" value="landscape" />
                <span>Landscape: 1152x896</span>
              </label>
            </div>
          </div>
          <div class="prompt-selectors-row">
            <div class="prompt-row-inline">
              <label for="artStyleSelector" class="icon-label">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M13.5 2a8.5 8.5 0 1 0 0 17H15a2 2 0 0 0 0-4h-1.5a1.5 1.5 0 1 1 0-3H15a5 5 0 0 0 0-10h-1.5ZM8 8.5a1.5 1.5 0 1 1 0 .01V8.5Zm-2.5 3A1.5 1.5 0 1 1 5.5 14a1.5 1.5 0 0 1 0-2.5Zm4.5 4.5a1.5 1.5 0 1 1 0 .01V16Zm6.5-7a1.5 1.5 0 1 1 0 .01V9Z" />
                </svg>
                <span>Art style (optional)</span>
              </label>
              <select id="artStyleSelector">
                <option value="">None</option>
                <option value="official art">official art</option>
                <option value="official style">official style</option>
                <option value="anime screencap">anime screencap</option>
                <option value="realistic">realistic</option>
                <option value="photorealistic">photorealistic</option>
                <option value="monochrome">monochrome</option>
                <option value="greyscale">greyscale</option>
                <option value="traditional media">traditional media</option>
              </select>
            </div>
            <div class="prompt-row-inline">
              <label for="bodyFramingSelector" class="icon-label">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 3a2 2 0 0 0-2 2v2h2V5h2V3H7Zm8 0v2h2v2h2V5a2 2 0 0 0-2-2h-2ZM12 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm-2 7c-2.2 0-4 1.8-4 4v3h12v-3c0-2.2-1.8-4-4-4h-4ZM5 17H3v2a2 2 0 0 0 2 2h2v-2H5v-2Zm16 0h-2v2h-2v2h2a2 2 0 0 0 2-2v-2Z" />
                </svg>
                <span>Body framing (optional)</span>
              </label>
              <select id="bodyFramingSelector">
                <option value="">None</option>
                <option value="full body">full body</option>
                <option value="cowboy shot">cowboy shot</option>
                <option value="upper body">upper body</option>
                <option value="lower body">lower body</option>
              </select>
            </div>
            <div class="prompt-row-inline">
              <label for="cameraSelector" class="icon-label">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 4 7.8 6H5a3 3 0 0 0-3 3v8a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V9a3 3 0 0 0-3-3h-2.8L15 4H9Zm3 4.5A4.5 4.5 0 1 0 12 18a4.5 4.5 0 0 0 0-9Zm0 2a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z" />
                </svg>
                <span>Camera angle (optional)</span>
              </label>
              <select id="cameraSelector">
                <option value="">None</option>
                <option value="from above">from above</option>
                <option value="from below">from below</option>
                <option value="from behind">from behind</option>
                <option value="from side">from side</option>
                <option value="dutch angle">dutch angle</option>
                <option value="close-up">close-up</option>
                <option value="foreshortening">foreshortening</option>
                <option value="wide shot">wide shot</option>
              </select>
            </div>
          </div>
          <div class="character-section">
            <h3>Character definition</h3>
            <div class="character-grid">
              <div class="prompt-row-inline">
                <label for="giantessCount">Giantess count</label>
                <select id="giantessCount">
                  <option value="1" selected>1 giantess</option>
                  <option value="2">2 giantess</option>
                </select>
              </div>
              <div class="prompt-row-inline">
                <label for="tiniesMode">Tinies mode</label>
                <select id="tiniesMode">
                  <option value="count" selected>Count</option>
                  <option value="group">Group</option>
                </select>
              </div>
              <div class="prompt-row-inline" id="tinyCountWrap">
                <label for="tinyCount">Tiny count</label>
                <input id="tinyCount" type="number" min="1" step="1" value="1" />
              </div>
              <div class="prompt-row-inline" id="tinyGenderWrap">
                <label for="tinyGender">Tiny gender (optional)</label>
                <select id="tinyGender">
                  <option value="" selected>None</option>
                  <option value="male">male</option>
                  <option value="female">female</option>
                  <option value="girl">girl</option>
                  <option value="boy">boy</option>
                </select>
              </div>
              <div class="prompt-row-inline">
                <label for="tinyDescriptor">Tiny descriptor (optional)</label>
                <input id="tinyDescriptor" type="text" placeholder="white" />
              </div>
            </div>
          </div>
          <button id="generateBtn" type="button">Generar</button>
        </div>
      </section>

      <section class="card preview-card">
        <div class="preview-head">
          <h2>Live Preview</h2>
          <span id="statusPill" class="pill waiting">Esperando</span>
        </div>
        <div class="preview-frame">
          <img id="previewImage" alt="Preview de generación" />
          <div id="previewPlaceholder" class="placeholder">No hay generación activa</div>
        </div>
        <div id="metaLine" class="meta"></div>
      </section>

      <section class="card settings-card">
        <div class="settings-head">
          <h2>Configuración</h2>
          <button id="saveSettingsBtn" type="button" class="ghost">Guardar configuración</button>
        </div>

        <div class="settings-grid">
          <div>
            <label for="positiveTags">Positive tags (se anteponen al prompt)</label>
            <textarea id="positiveTags" rows="4" placeholder="best quality, masterpiece"></textarea>
          </div>
          <div>
            <label for="negativeTags">Negative tags</label>
            <textarea id="negativeTags" rows="4" placeholder="worst quality, low quality"></textarea>
          </div>
        </div>
        <p id="saveStatus" class="meta"></p>
      </section>
    </main>
    <div id="imageModal" class="image-modal" aria-hidden="true">
      <button id="imageModalClose" class="image-modal-close" type="button" aria-label="Cerrar imagen">×</button>
      <img id="imageModalImg" alt="Imagen en pantalla completa" />
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
